{% extends "_base.txt" %}

{% block content -%}
<div style="font-family: Arial, sans-serif; line-height: 1.5; color: #1f2937;">
  <p>Здравствуйте!</p>
  <p>Кто-то, возможно вы, попытался сбросить пароль вашей учётной записи Matrix.</p>
  <p style="margin: 24px 0 8px; font-size: 14px; color: #6b7280;">Ваш код подтверждения:</p>
  <h1 style="margin: 0; padding: 16px 24px; display: inline-block; font-size: 42px; letter-spacing: 0.28em; background: #f3f4f6; border-radius: 12px;">
    {{ verification_code }}
  </h1>
  <p style="margin-top: 24px;">Если это были не вы, просто проигнорируйте это письмо.</p>
</div>
{%- endblock %}
