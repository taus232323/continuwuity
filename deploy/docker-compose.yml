services:
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    container_name: celeste_matrix_homeserver
    command: /sbin/conduwuit --config /etc/continuwuity/continuwuity.toml
    restart: unless-stopped
    ports:
      - "127.0.0.1:6167:8008"
    volumes:
      - continuwuity_db:/var/lib/continuwuity
      - ./continuwuity.toml:/etc/continuwuity/continuwuity.toml:ro
      - ./continuwuity-resolv.conf:/etc/resolv.conf:ro
    env_file:
      - ../.env

  matrix-chat:
    image: vectorim/element-web:latest
    container_name: celeste_matrix_chat
    restart: unless-stopped
    ports:
      - "127.0.0.1:3300:80"
    volumes:
      - ./element-config.json:/app/config.json:ro

  matrix-wellknown:
    image: nginx:alpine
    container_name: celeste_matrix_wellknown
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:80"
    volumes:
      - ./well-known/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./well-known:/usr/share/nginx/html/.well-known:ro

volumes:
  continuwuity_db:
